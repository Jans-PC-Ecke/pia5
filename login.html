<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P.I.A. 5 – Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 40px;
            border: 1px solid #334155;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h1 {
            color: #fb923c;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .login-card p {
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .login-card input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 4px;
        }
        .login-card input:focus { outline: none; border-color: #f97316; }
        .login-card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #f97316;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-card button:hover { background: #ea580c; }
        .login-card .error {
            color: #ef4444;
            margin-top: 12px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>P.I.A. 5</h1>
        <p>Dein persönlicher Assistent</p>
        <form method="POST" action="/login">
            <input type="password" name="pin" placeholder="PIN eingeben" maxlength="6" autofocus>
            <button type="submit">Zugriff</button>
        </form>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
